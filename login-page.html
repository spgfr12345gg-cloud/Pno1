<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="app">
        <div class="login-container">
            <div class="login-box">
                <h2>ยินดีต้อนรับ</h2>
                <p>เข้าสู่ระบบเพื่อสร้างสรรค์วิดีโอ</p>
                
                <form id="login-form" action="index.html" onsubmit="alert('เข้าสู่ระบบสำเร็จ!')">
                    <div class="form-group">
                        <input type="text" placeholder="ชื่อผู้ใช้งาน" required>
                    </div>
                    <div class="form-group">
                        <input type="password" placeholder="รหัสผ่าน" required>
                    </div>
                    <button type="submit" class="login-btn">เข้าสู่ระบบ</button>
                </form>
            </div>
        </div>
    </div>

</body>
</html>
